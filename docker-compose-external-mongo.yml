version: '3.8'

services:
  # Aplicação TrustScore Bot
  trustscore-bot:
    build: .
    container_name: trustscore-bot
    ports:
      - "3031:3031"
    environment:
      - NODE_ENV=production
      # MongoDB externo - configure a variável MONGODB_CNN no arquivo .env
    volumes:
      - ./logs:/usr/src/app/logs
      - ./.env:/usr/src/app/.env:rw
    restart: unless-stopped
    networks:
      - trustscore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3031/config/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  trustscore-network:
    driver: bridge